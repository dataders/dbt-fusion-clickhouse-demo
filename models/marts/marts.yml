version: 2

models:
  - name: fct_market_odds
    description: Market-side aggregates showing bet volume, total wagered amount, and implied probability.
    columns:
      - name: market_id
        description: Identifier for the prediction market.
        data_type: LowCardinality(String)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_markets')
                field: market_id
      - name: question
        description: Human-readable market question.
        data_type: String
        data_tests:
          - not_null
      - name: category
        description: Market grouping used for demo navigation.
        data_type: String
        data_tests:
          - not_null
      - name: side
        description: Side of the market being aggregated.
        data_type: LowCardinality(String)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['yes', 'no']
      - name: bet_count
        description: Number of bets placed for this market side.
        data_type: UInt64
        data_tests:
          - not_null
      - name: total_amount
        description: Total wagered amount for this market side.
        data_type: Decimal(38, 2)
        data_tests:
          - not_null
      - name: avg_implied_prob
        description: Average implied probability across bets for this market side.
        data_type: Float64
        data_tests:
          - not_null
      - name: latest_bet_at
        description: Most recent bet timestamp for this market side.
        data_type: DateTime64(3, 'UTC')
        data_tests:
          - not_null
