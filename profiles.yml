clickstream_demo:
  target: cloud
  outputs:
    cloud:
      type: clickhouse
      host: "{{ env_var('CLICKHOUSE_HOST') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', 8443) | as_number }}"
      user: "{{ env_var('CLICKHOUSE_KEY_ID') }}"
      password: "{{ env_var('CLICKHOUSE_KEY_SECRET') }}"
      schema: clickstream
      secure: true
      threads: 4
